<?xml version="1.0" encoding="UTF-8"?>
<!--
  NoGymForMe — Google Play feature graphic source.

  Specs:
    • 1024 × 500 px (Google Play required)
    • Fully opaque (no transparency, per Play Store guidelines)
    • Safe zone: central 924×400 (50px margins) to avoid Play UI overlays
    • Brand colors: #0A0A0A (black), #E8D900 (gold), #FFFFFF (white)
    • Hebrew RTL tagline + Latin wordmark — bilingual lockup

  Rasterized to PNG via rsvg-convert -w 1024 -h 500.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">

  <!-- ── Background layers ────────────────────────────────────────────── -->
  <defs>
    <radialGradient id="goldWashTopLeft" cx="18%" cy="22%" r="75%">
      <stop offset="0%"   stop-color="#E8D900" stop-opacity="0.16"/>
      <stop offset="38%"  stop-color="#E8D900" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="goldGlowBadge" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#E8D900" stop-opacity="0.10"/>
      <stop offset="80%"  stop-color="#E8D900" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Solid black foundation (fully opaque per Play Store rules) -->
  <rect width="1024" height="500" fill="#0A0A0A"/>
  <!-- Subtle gold wash for premium feel -->
  <rect width="1024" height="500" fill="url(#goldWashTopLeft)"/>

  <!-- ── LEFT: NGFM brand badge (250×250 in safe zone) ────────────────── -->
  <g transform="translate(95, 125)">
    <!-- Soft glow under badge -->
    <ellipse cx="125" cy="125" rx="160" ry="120" fill="url(#goldGlowBadge)"/>
    <!-- Badge tile -->
    <rect x="0" y="0" width="250" height="250" rx="52" ry="52" fill="#0A0A0A"/>
    <!-- Thin gold inner edge — matches app-icon.svg styling -->
    <rect x="6" y="6" width="238" height="238" rx="46" ry="46"
          fill="none" stroke="#E8D900" stroke-width="1.5" stroke-opacity="0.55"/>
    <!-- NGFM monogram -->
    <text x="125" y="135"
          font-family="'Helvetica Neue', 'Helvetica', 'Arial Black', sans-serif"
          font-weight="900"
          font-size="76"
          fill="#E8D900"
          text-anchor="middle"
          dominant-baseline="central"
          letter-spacing="-3">NGFM</text>
  </g>

  <!-- ── RIGHT: text stack, right-anchored at x=964 ───────────────────── -->

  <!-- Small Latin wordmark eyebrow -->
  <text x="964" y="155"
        font-family="'Helvetica Neue', 'Helvetica', Arial, sans-serif"
        font-weight="800"
        font-size="18"
        fill="#E8D900"
        text-anchor="end"
        letter-spacing="6">NOGYMFORME</text>

  <!-- Thin gold divider line under eyebrow -->
  <line x1="800" y1="170" x2="964" y2="170" stroke="#E8D900" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Tagline line 1 (white) — "פחות חדר כושר." -->
  <text x="964" y="245"
        font-family="Arial, 'Arial Hebrew', 'Helvetica Neue', sans-serif"
        font-weight="900"
        font-size="62"
        fill="#FFFFFF"
        text-anchor="start"
        direction="rtl">פחות חדר כושר.</text>

  <!-- Tagline line 2 (gold accent) — "יותר תוצאות." -->
  <text x="964" y="320"
        font-family="Arial, 'Arial Hebrew', 'Helvetica Neue', sans-serif"
        font-weight="900"
        font-size="62"
        fill="#E8D900"
        text-anchor="start"
        direction="rtl">יותר תוצאות.</text>

  <!-- Sub-tagline (grey) — small supporting copy -->
  <text x="964" y="390"
        font-family="Arial, 'Arial Hebrew', 'Helvetica Neue', sans-serif"
        font-weight="500"
        font-size="22"
        fill="#A0A0A0"
        text-anchor="start"
        direction="rtl">תוסף תזונה לגברים שלא הולכים לחדר כושר</text>

</svg>
