  <style>

<body>
  <div class="card">
    <div class="logo">NOGYM<span>FORME</span></div>
    <div class="check">✓</div>
    <h1>התשלום התקבל - תודה! 🎉</h1>
    <p class="sub">קיבלנו את ההזמנה שלך וחשבונית/קבלה תישלח אליך למייל מחברת הסליקה SUMIT.</p>
    <div class="plan" id="planLine"></div>
    <p class="note">המשלוח יוצא לדרך בימים הקרובים. יש שאלה? דברו איתנו בוואטסאפ ונשמח לעזור.</p>
    <a class="btn" href="index.html">חזרה לדף הבית</a>

  <script src="tracking.js"></script>
  <script>
    /* Map the plan passed back in the URL to a human label + value, so we can
       both show a confirmation line and report a Purchase to the Meta Pixel.

       The Purchase pixel is now gated on paid=1, which api/payment-callback.js
       only sets AFTER verifying the payment with SUMIT server-to-server. So a
       user opening this URL directly (no paid=1) will NOT fire a Purchase.
       Treat the SUMIT dashboard as the financial source of truth regardless. */
    var PLAN_LABELS = {
      single:       { label: 'חבילת הביישן',  value: 198 },
      starter:      { label: 'חבילת יאללה, בוא ננסה', value: 396 },
      results:      { label: 'חבילת אול-אין', value: 496 },
      subscription: { label: 'מנוי חודשי',     value: 155 }
    };
    var params   = new URLSearchParams(location.search);
    var planKey  = params.get('plan');
    var paid     = params.get('paid');        // '1' = server-verified payment
    var disc     = params.get('disc') === '1'; // a 10% code was applied
    var amtParam = parseInt(params.get('amt'), 10);
    if (!(amtParam > 0)) amtParam = 0;         // server-computed order total (ILS)

    // The full order (incl. items[] for a multi-item cart + shipping address)
    // was stashed in localStorage at checkout. The SUMIT redirect strips it from
    // the URL, so this is the only place with the complete data.
    var pending = null;
    try { pending = JSON.parse(localStorage.getItem('ngfm_order') || 'null'); } catch (e) { pending = null; }

    // Resolve the order into a display label + value + tracking summary, from
    // either the multi-item cart (pending.items) or the single-plan ?plan= link.
    function resolveOrder() {
      if (pending && Array.isArray(pending.items) && pending.items.length) {
        var label = pending.items.map(function (it) {
          var l = (PLAN_LABELS[it.plan] && PLAN_LABELS[it.plan].label) || it.plan;
          return it.qty > 1 ? (l + ' ×' + it.qty) : l;
        }).join(', ');
        // `summary` feeds the Apps Script `plan` field: a single package's KEY
        // (so per-plan labels/analytics/confirmation behave exactly as before) or
        // a readable Hebrew summary for a genuine mixed / multi-qty cart.
        var summary = (pending.items.length === 1 && pending.items[0].qty === 1)
          ? pending.items[0].plan
          : label;
        var value = amtParam > 0 ? amtParam : (parseInt(pending.total, 10) || 0);
        return { label: label, value: value, summary: summary, ok: value > 0 };
      }
      var info = PLAN_LABELS[planKey];
      if (!info) return { ok: false };
      var v = amtParam > 0 ? amtParam : (disc ? Math.round(info.value * 0.9) : info.value);
      return { label: info.label, value: v, summary: planKey, ok: true };
    }

    // Purchase fires ONLY on a payment our server verified with SUMIT (paid=1),
    // so it can't be triggered by someone opening this URL directly. We report it
    // BOTH ways - browser Pixel + server CAPI - sharing ONE event_id so Meta
    // deduplicates them into a single conversion instead of double-counting.
    var order = paid === '1' ? resolveOrder() : { ok: false };
    if (paid === '1' && order.ok) {
      document.getElementById('planLine').textContent = 'ההזמנה שלך: ' + order.label;

      var value = order.value;
      // Prefer the event_id our server minted (passed as ?eid=) so the browser
      // Pixel and the server CAPI event share one id and Meta dedupes them. Fall
      // back to a local id only if the server didn't provide one.
      var eventId = params.get('eid') || ('purchase_' + (planKey || 'order') + '_' + Date.now());
      var capiAlreadySent = params.get('capi') === '1';

      // 1) Browser Pixel - pass eventID so Meta can match it to the server event.
      if (typeof fbq === 'function') {
        fbq('track', 'Purchase', {
          content_name: order.label,
          value: value,
          currency: 'ILS'
        }, { eventID: eventId });
      }

      // 1a) TikTok Pixel - CompletePayment. Same paid=1 gate and same value as the
      // Meta Purchase above, so both platforms record ONE verified conversion. We
      // reuse `eventId` so a future TikTok Events API server event can dedupe.
      if (typeof ttq !== 'undefined' && typeof ttq.track === 'function') {
        var ttContents = (pending && Array.isArray(pending.items) && pending.items.length)
          ? pending.items.map(function (it) {
              return {
                content_id:   it.plan,
                content_name: (PLAN_LABELS[it.plan] && PLAN_LABELS[it.plan].label) || it.plan,
                quantity:     it.qty || 1,
                price:        (PLAN_LABELS[it.plan] && PLAN_LABELS[it.plan].value) || undefined
              };
            })
          : [{ content_id: order.summary, content_name: order.label, quantity: 1, price: value }];
        ttq.track('CompletePayment', {
          content_type: 'product',
          content_name: order.label,
          contents:     ttContents,
          value:        value,
          currency:     'ILS'
        }, { event_id: eventId });
      }

      // 1b) Record the COMPLETED order in the Google Sheet + trigger the buyer's
      // confirmation email. Clear the stash right after so a page refresh can't
      // record the order or email the buyer twice.
      try {
        if (pending && window.NGFMTrack && typeof NGFMTrack.completed === 'function') {
          var orderNum = (params.get('eid') || '').replace(/^purchase_/, '');
          NGFMTrack.completed({
            orderNum: orderNum,
            name:     pending.name,
            email:    pending.email,
            phone:    pending.phone,
            address:  pending.address,
            city:     pending.city,
            comments: pending.comments,
            plan:     order.summary,   // e.g. "single x1, results x2" for a cart
            total:    '₪' + value + (planKey === 'subscription' ? '/חודש' : '')
          });
          localStorage.removeItem('ngfm_order');
          localStorage.removeItem('ngfm_cart');   // empty the cart after a completed order
        }
      } catch (e) { /* tracking must never break the thank-you page */ }

      // 2) Server CAPI - only as a FALLBACK. Normally api/payment-callback.js has
      // already sent the server event (capi=1) using the customer's hashed email,
      // which matches better than cookies alone. We fire here ONLY when the server
      // didn't (capi missing) - e.g. an older/direct link - still reusing eventId.
      if (!capiAlreadySent) {
        var getCookie = function (n) {
          var m = document.cookie.match('(^|;)\\s*' + n + '\\s*=\\s*([^;]+)');
          return m ? m.pop() : undefined;
        };
        fetch('/api/meta-capi-purchase', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            event_id: eventId,
            value: value,
            currency: 'ILS',
            fbp: getCookie('_fbp'),
            fbc: getCookie('_fbc'),
            event_source_url: location.href
          })
        }).catch(function () { /* tracking must never break the thank-you page */ });
      }
    } else if (paid === '0') {
      // Payment not confirmed - show a neutral message instead of a success one.
      document.querySelector('h1').textContent = 'התשלום לא הושלם';
      document.querySelector('.sub').textContent =
        'נראה שהתשלום לא הושלם או בוטל. אפשר לנסות שוב, ואם חויבת בטעות - דברו איתנו בוואטסאפ ונסדר.';
      var check = document.querySelector('.check');
      if (check) { check.textContent = '!'; check.style.color = '#ffb020'; check.style.background = 'rgba(255,176,32,.12)'; }
    }
  </script>
