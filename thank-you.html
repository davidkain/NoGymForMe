<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תודה על ההזמנה · NOGYMFORME</title>
  <link rel="icon" type="image/svg+xml" href="/app-icon.svg">
  <meta name="theme-color" content="#0A0A0A">
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800;900&family=Rubik:wght@800;900&display=swap" rel="stylesheet">

  <!-- Meta Pixel Code -->
  <script>
  !function(f,b,e,v,n,t,s)
  {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)}(window, document,'script',
  'https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', '1001650429062777');
  fbq('track', 'PageView');
  </script>
  <noscript><img height="1" width="1" style="display:none"
  src="https://www.facebook.com/tr?id=1001650429062777&ev=PageView&noscript=1"
  /></noscript>
  <!-- End Meta Pixel Code -->

  <style>
    :root { --black:#0A0A0A; --white:#fff; --gold:#E8D900; --grey:#8a8680; --border:#222; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      background:var(--black); color:var(--white);
      font-family:'Assistant',sans-serif;
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      padding:24px; text-align:center;
    }
    .card {
      max-width:480px; width:100%;
      background:#111; border:1px solid var(--border); border-radius:20px;
      padding:48px 32px;
    }
    .check {
      width:72px; height:72px; margin:0 auto 24px;
      border-radius:50%; background:rgba(232,217,0,.12); color:var(--gold);
      display:flex; align-items:center; justify-content:center;
      font-size:38px; font-weight:900;
    }
    h1 { font-family:'Rubik',sans-serif; font-size:26px; font-weight:900; margin-bottom:12px; }
    .sub { color:#cfccc6; font-size:16px; line-height:1.6; margin-bottom:8px; }
    .plan { color:var(--gold); font-weight:800; margin:14px 0 22px; font-size:15px; }
    .note { color:var(--grey); font-size:13px; line-height:1.6; margin-bottom:28px; }
    .btn {
      display:inline-block; background:var(--gold); color:#000;
      font-weight:800; font-size:16px; text-decoration:none;
      padding:14px 28px; border-radius:12px;
    }
    .logo { font-family:'Rubik',sans-serif; font-weight:900; letter-spacing:1px; margin-bottom:28px; font-size:18px; }
    .logo span { color:var(--gold); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">NOGYM<span>FORME</span></div>
    <div class="check">✓</div>
    <h1>התשלום התקבל — תודה! 🎉</h1>
    <p class="sub">קיבלנו את ההזמנה שלך וחשבונית/קבלה תישלח אליך למייל מחברת הסליקה SUMIT.</p>
    <div class="plan" id="planLine"></div>
    <p class="note">המשלוח יוצא לדרך בימים הקרובים. יש שאלה? דברו איתנו בוואטסאפ ונשמח לעזור.</p>
    <a class="btn" href="index.html">חזרה לדף הבית</a>
  </div>

  <script>
    /* Map the plan passed back in the URL to a human label + value, so we can
       both show a confirmation line and report a Purchase to the Meta Pixel.

       The Purchase pixel is now gated on paid=1, which api/payment-callback.js
       only sets AFTER verifying the payment with SUMIT server-to-server. So a
       user opening this URL directly (no paid=1) will NOT fire a Purchase.
       Treat the SUMIT dashboard as the financial source of truth regardless. */
    var PLAN_LABELS = {
      single:       { label: 'חבילת הביישן',  value: 198 },
      starter:      { label: 'חבילת יאללה, בוא ננסה', value: 396 },
      results:      { label: 'חבילת אול-אין', value: 496 },
      subscription: { label: 'מנוי חודשי',     value: 155 }
    };
    var params  = new URLSearchParams(location.search);
    var planKey = params.get('plan');
    var paid    = params.get('paid');        // '1' = server-verified payment
    var disc    = params.get('disc') === '1'; // a 10% code was applied
    var info    = PLAN_LABELS[planKey];

    // Purchase fires ONLY on a payment our server verified with SUMIT (paid=1),
    // so it can't be triggered by someone opening this URL directly. We report it
    // BOTH ways — browser Pixel + server CAPI — sharing ONE event_id so Meta
    // deduplicates them into a single conversion instead of double-counting.
    if (paid === '1' && info) {
      document.getElementById('planLine').textContent = 'ההזמנה שלך: ' + info.label;

      var value   = disc ? Math.round(info.value * 0.9) : info.value;
      // Prefer the event_id our server minted (passed as ?eid=) so the browser
      // Pixel and the server CAPI event share one id and Meta dedupes them. Fall
      // back to a local id only if the server didn't provide one.
      var eventId = params.get('eid') || ('purchase_' + planKey + '_' + Date.now());
      var capiAlreadySent = params.get('capi') === '1';

      // 1) Browser Pixel — pass eventID so Meta can match it to the server event.
      if (typeof fbq === 'function') {
        fbq('track', 'Purchase', {
          content_name: info.label,
          value: value,
          currency: 'ILS'
        }, { eventID: eventId });
      }

      // 2) Server CAPI — only as a FALLBACK. Normally api/payment-callback.js has
      // already sent the server event (capi=1) using the customer's hashed email,
      // which matches better than cookies alone. We fire here ONLY when the server
      // didn't (capi missing) — e.g. an older/direct link — still reusing eventId.
      if (!capiAlreadySent) {
        var getCookie = function (n) {
          var m = document.cookie.match('(^|;)\\s*' + n + '\\s*=\\s*([^;]+)');
          return m ? m.pop() : undefined;
        };
        fetch('/api/meta-capi-purchase', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            event_id: eventId,
            value: value,
            currency: 'ILS',
            fbp: getCookie('_fbp'),
            fbc: getCookie('_fbc'),
            event_source_url: location.href
          })
        }).catch(function () { /* tracking must never break the thank-you page */ });
      }
    } else if (paid === '0') {
      // Payment not confirmed — show a neutral message instead of a success one.
      document.querySelector('h1').textContent = 'התשלום לא הושלם';
      document.querySelector('.sub').textContent =
        'נראה שהתשלום לא הושלם או בוטל. אפשר לנסות שוב, ואם חויבת בטעות — דברו איתנו בוואטסאפ ונסדר.';
      var check = document.querySelector('.check');
      if (check) { check.textContent = '!'; check.style.color = '#ffb020'; check.style.background = 'rgba(255,176,32,.12)'; }
    }
  </script>
</body>
</html>
